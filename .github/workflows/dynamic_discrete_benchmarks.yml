name: Dynamic Discrete Benchmarks

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    name: Benchmark (${{ matrix.agent }}, ${{ matrix.env_id }}, seed=${{ matrix.seed }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env_id: CartPole-v1
            timesteps: 50000
            end_e: 0.05
            agent: random_agent
            seed: 1
          - env_id: CartPole-v1
            timesteps: 50000
            end_e: 0.05
            agent: dqn_baseline
            seed: 1
          - env_id: CartPole-v1
            timesteps: 50000
            end_e: 0.05
            agent: dqn_reward_shaping
            seed: 1
          - env_id: MountainCar-v0
            timesteps: 75000
            end_e: 0.05
            agent: random_agent
            seed: 1
          - env_id: MountainCar-v0
            timesteps: 75000
            end_e: 0.05
            agent: dqn_baseline
            seed: 1
          - env_id: MountainCar-v0
            timesteps: 75000
            end_e: 0.05
            agent: dqn_reward_shaping
            seed: 1
          - env_id: Taxi-v3
            timesteps: 50000
            end_e: 0.05
            agent: random_agent
            seed: 1
          - env_id: Taxi-v3
            timesteps: 50000
            end_e: 0.05
            agent: dqn_baseline
            seed: 1
          - env_id: Taxi-v3
            timesteps: 50000
            end_e: 0.05
            agent: dqn_reward_shaping
            seed: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run benchmark
        run: |
          python src/${{ matrix.agent }}.py \
            --env-id ${{ matrix.env_id }} \
            --total-timesteps ${{ matrix.timesteps }} \
            --seed ${{ matrix.seed }} \
            --end-e ${{ matrix.end_e }}

      - name: Upload run results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark_${{ matrix.agent }}_${{ matrix.env_id }}_seed${{ matrix.seed }}
          path: results/
          retention-days: 14

  plot:
    name: Generate Plots and Push to Repo
    needs: benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark_*
          path: results/
          merge-multiple: true

      - name: Generate plots
        run: |
          for env in "CartPole-v1" "MountainCar-v0" "Taxi-v3"; do
            echo "Plotting $env..."
            python src/plot_benchmark_curves.py --env-id $env
          done

      - name: Commit and push plots
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          DIR_NAME="plots/dynamic_discrete_benchmarks_$TIMESTAMP"
          mkdir -p "$DIR_NAME"
          mv plots/*.png "$DIR_NAME/"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git pull origin main
          git add "$DIR_NAME/"
          git commit -m "Auto-generated dynamic discrete benchmark plots ($TIMESTAMP)" || echo "No changes to commit"
          git push origin main
