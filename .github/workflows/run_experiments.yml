name: Run Experiments (100k Steps)

on:
  workflow_dispatch:  # Trigger manually from GitHub UI or `gh workflow run`
    inputs:
      max_steps:
        description: 'Max steps per episode (-1 = env default)'
        required: false
        default: '-1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  train:
    name: Train (${{ matrix.agent }}, ${{ matrix.env_id }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # If one run fails, keep running the others
      matrix:
        env_id:
          - MiniGrid-Empty-6x6-v0
          - MiniGrid-DoorKey-6x6-v0
          - MiniGrid-FourRooms-v0
          - MiniGrid-MultiRoom-N2-S4-v0
        agent:
          - random_agent
          - dqn_baseline
          - dqn_reward_shaping
        seed:
          - 1
          - 2
          - 3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Agent (100k Steps, all defaults)
        run: |
          MAX_STEPS="${{ github.event.inputs.max_steps || '-1' }}"
          TIMESTEPS=100000
          EXPLORE_FRAC=0.60

          if [ "${{ matrix.env_id }}" = "MiniGrid-DoorKey-6x6-v0" ]; then
            TIMESTEPS=250000
          elif [ "${{ matrix.env_id }}" = "MiniGrid-FourRooms-v0" ] || [ "${{ matrix.env_id }}" = "MiniGrid-MultiRoom-N2-S4-v0" ]; then
            TIMESTEPS=500000
            EXPLORE_FRAC=0.80
          fi
          
          python src/${{ matrix.agent }}.py \
            --env-id ${{ matrix.env_id }} \
            --total-timesteps $TIMESTEPS \
            --seed ${{ matrix.seed }} \
            --max-steps $MAX_STEPS \
            --exploration-fraction $EXPLORE_FRAC \
            --fixed-layout
          
      - name: Upload Run Results
        uses: actions/upload-artifact@v4
        with:
          name: result_${{ matrix.agent }}_${{ matrix.env_id }}_seed${{ matrix.seed }}
          path: results/
          retention-days: 14

  plot:
    name: Generate Plots & Push to Repo
    needs: train  # Wait for all matrix training jobs to finish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push commits back to the repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: result_*
          path: results/
          merge-multiple: true
          
      - name: Generate Comparison and Heatmap Plots
        run: |
          for env in "MiniGrid-Empty-6x6-v0" "MiniGrid-DoorKey-6x6-v0" "MiniGrid-FourRooms-v0" "MiniGrid-MultiRoom-N2-S4-v0"; do
            echo "Plotting $env..."
            python src/plot_comparison.py --env-id $env
            python src/plot_state_action_freq.py --env-id $env
          done
          
      - name: Commit and Push Plots
        run: |
          # Create timestamped plots directory inside plots/
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          DIR_NAME="plots/plots_$TIMESTAMP"
          mkdir -p $DIR_NAME
          
          # Move all generated .png files into the new directory
          mv plots/*.png $DIR_NAME/
          
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes to avoid conflicts, add plots, commit, and push
          git pull origin main
          git add $DIR_NAME/
          git commit -m "Auto-generated plots for 100k steps ($TIMESTAMP)" || echo "No changes to commit"
          git push origin main
